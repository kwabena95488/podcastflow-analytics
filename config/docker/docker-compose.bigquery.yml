version: '3.8'

services:
  # BigQuery Emulator for local development
  bigquery-emulator:
    image: ghcr.io/goccy/bigquery-emulator:latest
    hostname: bigquery-emulator
    container_name: bigquery-emulator
    ports:
      - "9050:9050"
      - "9060:9060"
    environment:
      # Project configuration
      BIGQUERY_EMULATOR_PROJECT: podcastflow-analytics
      BIGQUERY_EMULATOR_PORT: 9050
      BIGQUERY_EMULATOR_HOST: 0.0.0.0
      # Enable REST API
      BIGQUERY_EMULATOR_REST_PORT: 9060
    volumes:
      - ./bigquery_init:/bigquery_init
      - bigquery-data:/data
    command: >
      sh -c "
        /bigquery-emulator 
        --project=podcastflow-analytics 
        --dataset=bronze,silver,gold,dbt_artifacts
        --port=9050 
        --rest-port=9060
        --data-from-yaml=/bigquery_init/initial_data.yaml
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9060/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # dbt with BigQuery emulator support
  dbt-bigquery:
    build:
      context: ./dbt_bigquery
      dockerfile: Dockerfile
    container_name: dbt-bigquery
    depends_on:
      bigquery-emulator:
        condition: service_healthy
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
      BIGQUERY_EMULATOR_HOST: bigquery-emulator:9050
    volumes:
      - ./dbt_podcast_analytics:/usr/app/dbt
      - ./dbt_profiles_bigquery.yml:/usr/app/dbt/profiles.yml
    working_dir: /usr/app/dbt
    command: ["tail", "-f", "/dev/null"]  # Keep container running

  # Original services with BigQuery integration options
  
  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: kafka
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka-data:/var/lib/kafka/data

  # Spark Master with BigQuery connector
  spark-master:
    image: bitnami/spark:3.5
    hostname: spark-master
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      # BigQuery connector
      - SPARK_CONF_spark_jars=gs://spark-lib/bigquery/spark-bigquery-latest_2.12.jar
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./streaming:/opt/spark-apps
      - ./data:/opt/spark-data
      - ./bigquery_jars:/opt/spark/jars/bigquery
      - spark-logs:/opt/spark/logs

  # Spark Worker with BigQuery connector
  spark-worker:
    image: bitnami/spark:3.5
    hostname: spark-worker
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./streaming:/opt/spark-apps
      - ./data:/opt/spark-data
      - ./bigquery_jars:/opt/spark/jars/bigquery
      - spark-logs:/opt/spark/logs

  # Redis for caching
  redis:
    image: redis:7-alpine
    hostname: redis
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  # Dashboard with BigQuery emulator support
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    depends_on:
      bigquery-emulator:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      BIGQUERY_EMULATOR_HOST: bigquery-emulator
      BIGQUERY_EMULATOR_PORT: 9050
      GOOGLE_CLOUD_PROJECT: podcastflow-analytics
    volumes:
      - ./dashboard:/app
    command: ["streamlit", "run", "app.py", "--server.address", "0.0.0.0"]

  # Jupyter Notebook for development
  jupyter:
    image: jupyter/pyspark-notebook:latest
    hostname: jupyter
    container_name: jupyter
    ports:
      - "8888:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "podcastflow"
      BIGQUERY_EMULATOR_HOST: bigquery-emulator:9050
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./streaming:/home/jovyan/streaming
      - ./data:/home/jovyan/data

  # Data initialization service
  data-init:
    image: python:3.9-slim
    container_name: data-init
    depends_on:
      bigquery-emulator:
        condition: service_healthy
    environment:
      BIGQUERY_EMULATOR_HOST: bigquery-emulator
      BIGQUERY_EMULATOR_PORT: 9050
    volumes:
      - ./scripts:/scripts
    working_dir: /scripts
    command: >
      sh -c "
        pip install google-cloud-bigquery pandas faker &&
        python load_sample_data_emulator.py
      "

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  redis-data:
  spark-logs:
  bigquery-data:

networks:
  default:
    name: podcastflow-bigquery-network 