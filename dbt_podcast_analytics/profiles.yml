podcastflow_analytics:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth  # Use oauth for development, service-account for production
      project: "{{ env_var('GCP_PROJECT_ID', env_var('GOOGLE_CLOUD_PROJECT', 'your-gcp-project')) }}"
      dataset: silver
      location: US
      threads: 4
      timeout_seconds: 300
      priority: interactive
      retries: 1
      
    prod:
      type: bigquery
      method: oauth  # Use oauth for development, service-account for production
      project: "{{ env_var('GCP_PROJECT_ID', env_var('GOOGLE_CLOUD_PROJECT', 'your-gcp-project')) }}"
      dataset: gold
      location: US
      threads: 8
      timeout_seconds: 300
      priority: batch
      retries: 3
      
    test:
      type: bigquery
      method: oauth
      project: "{{ env_var('GCP_PROJECT_ID', env_var('GOOGLE_CLOUD_PROJECT', 'your-gcp-project')) }}"
      dataset: test
      location: US
      threads: 2
      timeout_seconds: 300
      priority: interactive
      retries: 1
