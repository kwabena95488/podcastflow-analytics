name: 'podcast_analytics'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'podcastflow_analytics'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
models:
  # Elementary observability models use DML (MERGE/INSERT). Enabled now that billing is on
  # (billing account: job-search-app). These track run results, model/source/test metadata.
  elementary:
    +enabled: true
  podcast_analytics:
    # Configuration for staging models (Bronze -> Silver)
    staging:
      +materialized: view
      +schema: silver
    
    # Configuration for marts (Gold layer)
    marts:
      +materialized: table
      +schema: gold

# Project variables
vars:
  # Lower bound for ingestion_timestamp filtering in staging models.
  start_date: '2020-01-01' 